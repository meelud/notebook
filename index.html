<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notepad</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808;
  --text: #c8c3b8;
  --dim: #1e1e1b;
  --dimtxt: #42423c;
  --accent: #7a9068;
  --hl: #e8e2d6;
}
html, body { height: 100%; background: var(--bg); color: var(--text); }
body { display: flex; flex-direction: column; align-items: center; font-family: 'Inter', sans-serif; }

#bar {
  position: fixed;
  top: 26px;
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  display: flex; align-items: center; gap: 22px;
  padding: 11px 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.045);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  opacity: 0;
  transition: opacity 0.5s ease, transform 0.5s ease;
  z-index: 10;
}
body:hover #bar, #bar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.btn {
  background: none; border: none;
  font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 300;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--dimtxt); cursor: pointer; padding: 0; transition: color 0.25s;
  display: flex; align-items: baseline; gap: 6px;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { color: var(--text); }
.btn:disabled { opacity: 0.18; cursor: default; }
.btn.go { color: var(--accent); }
.btn.go:hover:not(:disabled) { color: var(--hl); }

.key {
  font-size: 8.5px;
  letter-spacing: 0;
  text-transform: none;
  opacity: 0.5;
}

#wc { font-size: 10px; font-weight: 300; letter-spacing: 0.1em; color: var(--dimtxt); }

#wrap { width: 100%; max-width: 640px; flex: 1; padding: 100px 0 140px; position: relative; }

#editor {
  width: 100%; min-height: 60vh;
  background: transparent; border: none; outline: none; resize: none;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 21px; line-height: 2; letter-spacing: 0.01em;
  color: var(--text); caret-color: var(--accent);
}

#render {
  position: absolute; top: 100px; left: 0; width: 100%;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 21px; line-height: 2; letter-spacing: 0.01em;
  color: var(--text); white-space: pre-wrap; word-break: break-word;
  pointer-events: none; display: none;
}

.w-active {
  color: var(--hl);
  font-weight: 500;
  text-shadow: 0 0 26px rgba(232,226,214,0.22);
  display: inline-block;
  animation: wordIn 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes wordIn {
  0%   { color: var(--text); text-shadow: none; transform: scale(1) translateY(0); letter-spacing: 0.01em; }
  35%  { transform: scale(1.018) translateY(-1px); }
  100% { color: var(--hl); text-shadow: 0 0 26px rgba(232,226,214,0.22); transform: scale(1) translateY(0); }
}

#ph {
  position: absolute; top: 100px; left: 0;
  font-family: 'Inter', sans-serif;
  font-style: normal; font-weight: 300; font-size: 16px; line-height: 2;
  letter-spacing: 0.02em;
  color: var(--dimtxt); pointer-events: none;
}

#foot {
  position: fixed; bottom: 0; left: 0; width: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 30px; pointer-events: none;
}
#prog { width: 100%; max-width: 640px; height: 1px; background: var(--dim); margin-bottom: 22px; opacity: 0; transition: opacity 0.4s; }
#pf   { height: 100%; background: var(--accent); width: 0; transition: width 0.12s linear; }
#prog.on { opacity: 1; }
#viz  { display: flex; gap: 3px; align-items: flex-end; height: 18px; margin-bottom: 14px; opacity: 0; transition: opacity 0.4s; }
#viz.on { opacity: 1; }
.bar  { width: 1.5px; background: var(--accent); border-radius: 1px; min-height: 1.5px; transition: height 0.08s ease-out; }
#st   { font-size: 9px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dimtxt); }
</style>
</head>
<body>

<div id="bar">
  <button class="btn go" id="bPlay" disabled>play <span class="key">⇧↵</span></button>
  <button class="btn" id="bStop" disabled>stop <span class="key">esc</span></button>
  <button class="btn" id="bSave" disabled>save <span class="key">⌘s</span></button>
  <button class="btn" id="bClear">clear</button>
  <span id="wc">0 words</span>
</div>

<div id="wrap">
  <div id="ph">Write anything.</div>
  <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  <div id="render"></div>
</div>

<div id="foot">
  <div id="prog"><div id="pf"></div></div>
  <div id="viz">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>
  <div id="st">ready</div>
</div>

<script>
const editor = document.getElementById('editor');
const render = document.getElementById('render');
const ph     = document.getElementById('ph');
const bPlay  = document.getElementById('bPlay');
const bStop  = document.getElementById('bStop');
const bSave  = document.getElementById('bSave');
const bClear = document.getElementById('bClear');
const wcEl   = document.getElementById('wc');
const viz    = document.getElementById('viz');
const bars   = viz.querySelectorAll('.bar');
const stEl   = document.getElementById('st');
const prog   = document.getElementById('prog');
const pf     = document.getElementById('pf');

let AC = null, playing = false, stopping = false;
let rec = null, chunks = [], audioBlob = null;
let ambTimers = [];
let reverbNode = null, reverbSend = null;

function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
// ── Seeded randomness ──────────────────────────────────────────
// Every "random" choice during playback (which note, which voice, how
// long, ambient timing) must come out the SAME way every time the same
// text is played, or the piece sounds different on every replay even
// though the key/scale is locked. So rnd()/pick() draw from a seeded
// PRNG (mulberry32) that gets reset to a fixed seed at the start of
// every play() call — same text → same seed → same exact sequence.
let _rngState = 123456789;
function seedRng(seed) { _rngState = (seed >>> 0) || 1; }
function _rand() {
  // mulberry32
  _rngState |= 0; _rngState = (_rngState + 0x6D2B79F5) | 0;
  let t = Math.imul(_rngState ^ (_rngState >>> 15), 1 | _rngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
function rnd(a, b) { return a + _rand() * (b - a); }
function pick(a)   { return a[Math.floor(_rand() * a.length)]; }

// Word-note palette is built per-text from currentScale (set by deriveTextHarmony),
// spread across a few octaves for melodic variety. Replaces the old fixed scale.
function wordNoteScale() {
  const out = [];
  [0.5, 1, 2, 4].forEach(oct => currentScale.forEach(f => out.push(f * oct)));
  return out;
}

function buildReverb(c) {
  const dur = 4.5, decay = 2.2;
  const len = Math.floor(c.sampleRate * dur);
  const buf = c.createBuffer(2, len, c.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (_rand() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  const conv = c.createConvolver();
  conv.buffer = buf;
  return conv;
}

function ensureReverb(dests) {
  const c = ac();
  if (!reverbNode) {
    reverbNode = buildReverb(c);
    reverbSend = c.createGain();
    reverbSend.gain.value = 0.38;
    reverbNode.connect(reverbSend);
    dests.forEach(d => reverbSend.connect(d));
  }
}

// Voice types — each with different character
const VOICES = [
  // 1. Soft pad — slow attack, sine+sub
  (freq, vol, dur, dests) => {
    const c = ac();
    [[freq, 'sine', 1.0], [freq*0.5, 'sine', 0.4], [freq*2, 'triangle', 0.12]].forEach(([f, type, lv]) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = type; osc.frequency.value = f;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * lv * 0.7, c.currentTime + 0.12);
      g.gain.setValueAtTime(vol * lv * 0.7, c.currentTime + dur * 0.6);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.5);
      osc.connect(g); g.connect(reverbNode);
      dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 0.6);
    });
  },
  // 2. Plucked string — fast attack, slow decay
  (freq, vol, dur, dests) => {
    const c = ac();
    const osc = c.createOscillator(), g = c.createGain();
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq * 3; lp.Q.value = 2;
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol * 0.55, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.9);
    osc.connect(lp); lp.connect(g);
    g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + dur + 1.0);

    // Harmonic overtone
    const osc2 = c.createOscillator(), g2 = c.createGain();
    osc2.type = 'sine'; osc2.frequency.value = freq * 2.01;
    g2.gain.setValueAtTime(vol * 0.12, c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur * 0.5);
    osc2.connect(g2); g2.connect(reverbNode); dests.forEach(d => g2.connect(d));
    osc2.start(); osc2.stop(c.currentTime + dur * 0.6);
  },
  // 3. Breath — detuned saw cluster, very filtered
  (freq, vol, dur, dests) => {
    const c = ac();
    [-7, 0, 5].forEach(det => {
      const osc = c.createOscillator(), lp = c.createBiquadFilter(), g = c.createGain();
      lp.type = 'lowpass'; lp.frequency.value = 500 + rnd(0, 200); lp.Q.value = 0.5;
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = det;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * 0.22, c.currentTime + 0.18);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.4);
      osc.connect(lp); lp.connect(g);
      g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 0.5);
    });
  },
  // 4. Bell / metallic — inharmonic partials
  (freq, vol, dur, dests) => {
    const c = ac();
    const partials = [1, 2.756, 5.404, 8.933, 13.35].map((r, i) => ({ f: freq * r, v: vol * Math.pow(0.55, i) }));
    partials.forEach(({ f, v }) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(v * 0.35, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + rnd(0.3, 1.2));
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 1.3);
    });
  },
  // 5. Ghost chord — three quiet sine notes
  (freq, vol, dur, dests) => {
    const c = ac();
    const ratios = [1, 1.498, 1.782]; // root, fifth, minor seventh
    ratios.forEach(r => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = freq * r;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * 0.28, c.currentTime + 0.08);
      g.gain.setValueAtTime(vol * 0.28, c.currentTime + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.6);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 0.7);
    });
  },
  // 6. Piano — fast hammer attack, multiple inharmonic-ish partials, natural decay
  (freq, vol, dur, dests) => {
    const c = ac();
    const partials = [
      { r: 1,     v: 1.0,  det: 0   },
      { r: 2.0,   v: 0.35, det: 3   },
      { r: 3.005, v: 0.16, det: -2  },
      { r: 4.02,  v: 0.08, det: 0   },
    ];
    partials.forEach(({ r, v, det }) => {
      const osc = c.createOscillator(), g = c.createGain();
      const lp  = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq * r * 4;
      osc.type = 'triangle'; osc.frequency.value = freq * r; osc.detune.value = det;
      const decay = dur + rnd(0.9, 1.8);
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * v, c.currentTime + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(lp); lp.connect(g);
      g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
    // hammer noise transient
    const buf = c.createBuffer(1, Math.ceil(c.sampleRate * 0.02), c.sampleRate);
    const bd = buf.getChannelData(0);
    for (let i = 0; i < bd.length; i++) bd[i] = (_rand()*2-1) * Math.exp(-i / (c.sampleRate*0.004));
    const src = c.createBufferSource(); src.buffer = buf;
    const hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800;
    const ng = c.createGain(); ng.gain.value = vol * 0.1;
    src.connect(hp); hp.connect(ng);
    dests.forEach(d => ng.connect(d));
    src.start();
  },
  // 7. Warm synth pad — slow swell, analog-style, Daft Punk-ish
  (freq, vol, dur, dests) => {
    const c = ac();
    const swell = Math.max(dur * 1.4, 0.5);
    [
      { type: 'sawtooth', det: -6,  v: 0.5  },
      { type: 'sawtooth', det: 6,   v: 0.5  },
      { type: 'sine',     det: 0,   v: 0.4  },
      { type: 'sine',     det: 0,   v: 0.22, oct: 0.5 },
    ].forEach(({ type, det, v, oct }) => {
      const osc = c.createOscillator(), g = c.createGain();
      const lp  = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1100; lp.Q.value = 0.7;
      osc.type = type; osc.frequency.value = freq * (oct || 1); osc.detune.value = det;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * v * 0.55, c.currentTime + swell * 0.45);
      g.gain.linearRampToValueAtTime(0, c.currentTime + swell);
      osc.connect(lp); lp.connect(g);
      g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + swell + 0.1);
    });
  },
  // 8. Plucked string ensemble — guitar/harp-like pluck with body resonance
  (freq, vol, dur, dests) => {
    const c = ac();
    const decay = dur + rnd(1.2, 2.4);
    const osc  = c.createOscillator(), g = c.createGain();
    const bp   = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq * 1.5; bp.Q.value = 3;
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol * 0.5, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
    osc.connect(bp); bp.connect(g);
    g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + decay + 0.1);
    // body resonance octave below
    const osc2 = c.createOscillator(), g2 = c.createGain();
    osc2.type = 'sine'; osc2.frequency.value = freq * 0.5;
    g2.gain.setValueAtTime(vol * 0.22, c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay * 0.8);
    osc2.connect(g2); g2.connect(reverbNode); dests.forEach(d => g2.connect(d));
    osc2.start(); osc2.stop(c.currentTime + decay * 0.85);
  },
  // 9. Marimba — woody, fast attack, mid partials, quick decay
  (freq, vol, dur, dests) => {
    const c = ac();
    [{r:1,v:1,t:'sine'},{r:4.0,v:0.18,t:'sine'},{r:9.8,v:0.06,t:'sine'}].forEach(({r,v,t}) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = t; osc.frequency.value = freq * r;
      const decay = dur * 0.6 + rnd(0.15, 0.35);
      g.gain.setValueAtTime(vol * v * 0.6, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.05);
    });
  },
  // 10. Glass / FM-ish bell — clean inharmonic ring, longer tail
  (freq, vol, dur, dests) => {
    const c = ac();
    [1, 2.41, 3.9, 6.13].forEach((r, i) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = freq * r;
      const decay = dur + rnd(0.6, 1.6) + i * 0.2;
      g.gain.setValueAtTime(vol * Math.pow(0.5, i) * 0.4, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
  },
  // 11. Vibraphone — sine with slow tremolo shimmer
  (freq, vol, dur, dests) => {
    const c = ac();
    const osc = c.createOscillator(), g = c.createGain();
    const lfo = c.createOscillator(), lfoGain = c.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 5.5;
    lfoGain.gain.value = vol * 0.15;
    lfo.connect(lfoGain); lfoGain.connect(g.gain);
    osc.type = 'sine'; osc.frequency.value = freq;
    const decay = dur + rnd(1.0, 2.0);
    g.gain.setValueAtTime(vol * 0.5, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    lfo.start(); osc.start();
    lfo.stop(c.currentTime + decay + 0.1); osc.stop(c.currentTime + decay + 0.1);
  },
  // 12. Music box — bright, fast decay, slightly detuned twin oscillators
  (freq, vol, dur, dests) => {
    const c = ac();
    [0, 6].forEach(det => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq * 2; osc.detune.value = det;
      const decay = dur * 0.5 + rnd(0.3, 0.7);
      g.gain.setValueAtTime(vol * 0.35, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
  },
  // 13. Choir pad — stacked detuned sines with slow vowel-like filter sweep
  (freq, vol, dur, dests) => {
    const c = ac();
    const swell = Math.max(dur * 1.6, 0.8);
    [-5, 0, 5, 12].forEach(det => {
      const osc = c.createOscillator(), g = c.createGain();
      const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq * 2; bp.Q.value = 1.5;
      bp.frequency.setValueAtTime(freq * 1.5, c.currentTime);
      bp.frequency.linearRampToValueAtTime(freq * 2.5, c.currentTime + swell);
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = det;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * 0.13, c.currentTime + swell * 0.4);
      g.gain.linearRampToValueAtTime(0, c.currentTime + swell);
      osc.connect(bp); bp.connect(g);
      g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + swell + 0.1);
    });
  },
  // 14. Soft organ — additive square/sine drawbar style, even sustain
  (freq, vol, dur, dests) => {
    const c = ac();
    [{r:1,v:0.6},{r:2,v:0.3},{r:3,v:0.15},{r:4,v:0.1}].forEach(({r,v}) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = freq * r;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * v * 0.5, c.currentTime + 0.05);
      g.gain.setValueAtTime(vol * v * 0.5, c.currentTime + dur * 0.7);
      g.gain.linearRampToValueAtTime(0, c.currentTime + dur + 0.3);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 0.35);
    });
  },
  // 15. Sub thump — deep, percussive, mostly felt not heard
  (freq, vol, dur, dests) => {
    const c = ac();
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq * 0.25, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.18, c.currentTime + 0.3);
    g.gain.setValueAtTime(vol * 0.6, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.4);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + dur + 0.5);
  },
  // 16. Reed / woodwind-ish — square wave softened, gentle vibrato
  (freq, vol, dur, dests) => {
    const c = ac();
    const osc = c.createOscillator(), g = c.createGain();
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq * 4;
    const lfo = c.createOscillator(), lfoGain = c.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 4.5; lfoGain.gain.value = 3;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    osc.type = 'square'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.28, c.currentTime + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.5);
    osc.connect(lp); lp.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    lfo.start(); osc.start();
    lfo.stop(c.currentTime + dur + 0.6); osc.stop(c.currentTime + dur + 0.6);
  },
  // 17. Bowed cello-ish — slow attack sawtooth with formant filter
  (freq, vol, dur, dests) => {
    const c = ac();
    const osc = c.createOscillator(), g = c.createGain();
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq * 2.2; bp.Q.value = 2.5;
    osc.type = 'sawtooth'; osc.frequency.value = freq * 0.5;
    const swell = Math.max(dur * 1.3, 0.6);
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.4, c.currentTime + swell * 0.5);
    g.gain.linearRampToValueAtTime(0, c.currentTime + swell);
    osc.connect(bp); bp.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + swell + 0.1);
  },
  // 18. Kalimba — plucky metallic, layered odd harmonics
  (freq, vol, dur, dests) => {
    const c = ac();
    [{r:1,v:1},{r:3.2,v:0.2},{r:5.1,v:0.08}].forEach(({r,v}) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq * r;
      const decay = dur * 0.7 + rnd(0.4, 0.9);
      g.gain.setValueAtTime(vol * v * 0.5, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
  },
  // 19. Synth brass swell — bright sawtooth stack with filter sweep up
  (freq, vol, dur, dests) => {
    const c = ac();
    const swell = Math.max(dur * 1.2, 0.4);
    [-4, 4].forEach(det => {
      const osc = c.createOscillator(), g = c.createGain();
      const lp = c.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(300, c.currentTime);
      lp.frequency.linearRampToValueAtTime(freq * 5, c.currentTime + swell * 0.4);
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = det;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * 0.3, c.currentTime + swell * 0.3);
      g.gain.linearRampToValueAtTime(0, c.currentTime + swell);
      osc.connect(lp); lp.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + swell + 0.1);
    });
  },
  // 20. Detuned celeste — delicate, high register, twinkling
  (freq, vol, dur, dests) => {
    const c = ac();
    [0, 9, -9].forEach(det => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = freq * 2; osc.detune.value = det;
      const decay = dur + rnd(0.8, 1.5);
      g.gain.setValueAtTime(vol * 0.22, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
  },
  // 21. Granular texture — short noise-filtered grain pitched to the note
  (freq, vol, dur, dests) => {
    const c = ac();
    const glen = Math.max(0.08, dur * 0.5);
    const buf = c.createBuffer(1, Math.ceil(c.sampleRate * glen), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = (_rand()*2-1) * Math.pow(Math.sin(Math.PI * j / d.length), 0.7);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq * 2; bp.Q.value = 4;
    const g = c.createGain(); g.gain.value = vol * 0.4;
    src.connect(bp); bp.connect(g); g.connect(reverbNode); dests.forEach(d2 => g.connect(d2));
    src.start();
    // pair with a quiet sine to keep it pitched and musical, not just noise
    const osc = c.createOscillator(), g2 = c.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g2.gain.setValueAtTime(vol * 0.15, c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur + 0.3);
    osc.connect(g2); g2.connect(reverbNode); dests.forEach(d2 => g2.connect(d2));
    osc.start(); osc.stop(c.currentTime + dur + 0.4);
  },
  // 22. Deep gong-ish swell — slow, dark, long inharmonic tail
  (freq, vol, dur, dests) => {
    const c = ac();
    [1, 1.78, 2.4, 3.6].forEach((r, i) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = freq * 0.5 * r;
      const decay = dur + rnd(1.5, 3) + i * 0.3;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol * Math.pow(0.6, i) * 0.4, c.currentTime + 0.3);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + decay);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + decay + 0.1);
    });
  },
];

// Punctuation-specific accent sounds — distinct tone/voice per mark
function playPunctuation(ch, dests, intensity) {
  const c = ac();
  if (ch === '.') {
    // soft low closing tone — settles
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(130.81, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(98, c.currentTime + 0.5);
    g.gain.setValueAtTime(0.22 * intensity, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.7);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + 0.8);
  } else if (ch === ',') {
    // light upward tick — a small breath
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(196, c.currentTime);
    g.gain.setValueAtTime(0.12 * intensity, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.22);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + 0.3);
  } else if (ch === '!') {
    // bright stacked accent — emphatic
    [523.25, 659.25, 784].forEach((f, i) => {
      const osc = c.createOscillator(), g = c.createGain();
      osc.type = 'triangle'; osc.frequency.value = f;
      g.gain.setValueAtTime(0.2 * intensity * (1 - i*0.25), c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.4);
      osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + 0.5);
    });
  } else if (ch === '?') {
    // rising pitch glide — questioning
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(293.66, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, c.currentTime + 0.35);
    g.gain.setValueAtTime(0.18 * intensity, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.5);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + 0.6);
  } else if (ch === '\n') {
    // deep resonant gap marker
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(73.42, c.currentTime);
    g.gain.setValueAtTime(0.15 * intensity, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 1.1);
    osc.connect(g); g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + 1.2);
  }
}

// ── Mood-derived scale ────────────────────────────────────────
// Each piece of text gets its OWN scale, chosen from its mood — not
// random, and not the same every time. Same text → same scale always,
// since it's derived from the text itself (word list + punctuation).
// All frequencies below are generated programmatically from semitone
// offsets, not typed by hand, so there is no chance of an accidental
// off-scale note sneaking in.

const MODE_OFFSETS = {
  minor:         [0, 2, 3, 5, 7, 8, 10],  // Aeolian — dark, heavy
  locrian:       [0, 1, 3, 5, 6, 8, 10],  // unstable, ominous, unresolved
  phrygian:      [0, 1, 3, 5, 7, 8, 10],  // dark, tense, exotic
  harmonicMinor: [0, 2, 3, 5, 7, 8, 11],  // dramatic, exotic tension
  dorian:        [0, 2, 3, 5, 7, 9, 10],  // dark but lifted, bittersweet
  melodicMinor:  [0, 2, 3, 5, 7, 9, 11],  // smooth, jazzy, wistful
  mixolydian:    [0, 2, 4, 5, 7, 9, 10],  // major-ish but unresolved, bluesy
  lydian:        [0, 2, 4, 6, 7, 9, 11],  // bright, strange, dreamlike — very Aphex
  major:         [0, 2, 4, 5, 7, 9, 11],  // warm, open, resolved
};
// ordered from darkest/heaviest to brightest/warmest — detectMood below
// picks an index into this ordering based on a continuous mood score,
// so nearby moods land on nearby-feeling modes instead of jumping randomly
const MODE_ORDER = ['minor','locrian','phrygian','harmonicMinor','dorian','melodicMinor','mixolydian','lydian','major'];

// A much larger emotion lexicon, grouped by category rather than just pos/neg —
// each category has its own pull on the mood score and on "tension" (instability),
// so the detector reads more like real sentiment than a simple word-counter.
const EMOTION_LEXICON = {
  joy: { weight: 1.1, tense: 0, words: [
    'happy','joy','joyful','delight','delighted','glad','cheerful','elated','bliss','blissful',
    'wonderful','great','fantastic','amazing','laugh','laughing','smile','smiling','fun','playful',
    'excited','sunny','bright','radiant','vibrant','lively',
    'شاد','خوشحال','شادمان','خنده','لبخند','سرخوش','بانمک','هیجان','شور','شعف','مسرور','سرزنده'
  ]},
  love: { weight: 1.0, tense: 0, words: [
    'love','loving','adore','affection','sweetheart','darling','cherish','beloved','romance',
    'kiss','embrace','tender','devotion','soulmate','warmth','caring',
    'عشق','دلبر','محبوب','دوست‌داشتن','عاشق','نازنین','دلتنگ','مهربان','صمیمی','محبت','دلداده'
  ]},
  calm: { weight: 0.7, tense: -0.3, words: [
    'calm','peace','peaceful','serene','quiet','still','gentle','soft','tranquil','rest','resting',
    'breathe','ease','relax','relaxed','soothing','silence','stillness',
    'آرام','آرامش','سکوت','ساکت','راحت','استراحت','نرم','ملایم','صلح','هدوء','سکون'
  ]},
  hope: { weight: 0.8, tense: -0.1, words: [
    'hope','hopeful','dream','dreaming','future','faith','believe','wish','light','promise',
    'grateful','gratitude','free','freedom','alive','beginning','new','grow','growth',
    'امید','امیدوار','رویا','آینده','ایمان','آرزو','نور','شکرگزار','آزاد','زندگی','رشد','شروع'
  ]},
  sadness: { weight: -1.0, tense: 0.1, words: [
    'sad','sadness','sorrow','grief','grieving','cry','crying','tears','weep','heartbroken',
    'lonely','alone','loneliness','empty','emptiness','hollow','loss','lost','miss','missing',
    'hurt','hurting','broken','depressed','down','blue','gloom','gloomy','melancholy','heavy',
    'غم','غمگین','اندوه','گریه','اشک','تنها','تنهایی','خالی','شکست','شکسته','از دست دادن',
    'دلتنگی','درد','افسرده','سنگین','ملال','اندوهگین'
  ]},
  fear: { weight: -0.9, tense: 0.5, words: [
    'fear','afraid','scared','terrified','terror','dread','anxious','anxiety','worry','worried',
    'nervous','panic','threat','danger','unsafe','trembling','frightened','horror','nightmare',
    'ترس','ترسیده','وحشت','نگران','نگرانی','اضطراب','استرس','خطر','کابوس','لرزان','هراس'
  ]},
  anger: { weight: -0.7, tense: 1.0, words: [
    'anger','angry','furious','fury','rage','enraged','mad','hate','hatred','resent','resentment',
    'bitter','bitterness','outrage','irritated','frustrated','frustration','scream','screaming',
    'fight','fighting','violent','violence','chaos','chaotic','explode','explosive',
    'خشم','عصبانی','غضب','نفرت','کینه','خشمگین','عصبانیت','جنگ','هرج و مرج','وحشی','انفجار'
  ]},
  dark: { weight: -0.8, tense: 0.4, words: [
    'dark','darkness','cold','coldness','death','dying','dead','despair','desperate','hopeless',
    'void','abyss','shadow','shadows','bleak','doom','suffering','pain','painful','wound','wounded',
    'تاریک','تاریکی','سرد','سرما','مرگ','مردن','ناامید','نومیدی','رنج','درد','زخم','سایه','تباهی'
  ]},
  nostalgia: { weight: -0.2, tense: -0.1, words: [
    'remember','memory','memories','past','once','childhood','old','faded','distant',
    'longing','yearning','bittersweet','farewell','goodbye','gone','fading','nostalgia','nostalgic',
    'یاد','خاطره','خاطرات','گذشته','کودکی','دلتنگی','خداحافظ','رفته','محو','دور'
  ]},
};

function buildScale(rootHz, modeName) {
  const offsets = MODE_OFFSETS[modeName] || MODE_OFFSETS.minor;
  return offsets.map(o => rootHz * Math.pow(2, o / 12));
}

// Simple deterministic hash so the same text always maps to the same root —
// not random, but text-dependent (different text very likely picks a different root)
function hashText(text) {
  let h = 0;
  for (let i = 0; i < text.length; i++) h = (h * 31 + text.charCodeAt(i)) >>> 0;
  return h;
}

// Build a flat lookup once: word -> { weight, tense } for fast matching
const WORD_LOOKUP = (() => {
  const map = {};
  Object.values(EMOTION_LEXICON).forEach(({ weight, tense, words }) => {
    words.forEach(w => { map[w] = { weight, tense }; });
  });
  return map;
})();

function detectMood(text) {
  const lower = text.toLowerCase();
  const words = lower.match(/[a-zA-Zا-ی]+/g) || [];
  let score = 0;
  let tense = 0;
  words.forEach(w => {
    const hit = WORD_LOOKUP[w];
    if (hit) { score += hit.weight; tense += hit.tense; }
  });
  const exclaim  = (text.match(/!/g) || []).length;
  const question = (text.match(/\?/g) || []).length;
  const ellipsis = (text.match(/\.\.\./g) || []).length;
  score += exclaim * 0.4;    // energetic punctuation tilts brighter
  score -= question * 0.25;  // questioning punctuation tilts more wistful
  score -= ellipsis * 0.3;   // trailing-off tilts darker/uncertain
  tense += exclaim * 0.5;    // exclamation alongside negative content reads as more unstable

  const norm = score / Math.max(3, Math.sqrt(words.length));
  const tenseNorm = tense / Math.max(3, Math.sqrt(words.length));

  // map continuous mood score onto the 9-step dark→bright ordering
  // norm range roughly -1.2 .. +1.2 → index 0 (minor) .. 8 (major)
  const clamped = Math.max(-1.2, Math.min(1.2, norm));
  let idx = Math.round(((clamped + 1.2) / 2.4) * (MODE_ORDER.length - 1));

  // strong tension/anger pulls toward the unstable/exotic modes (locrian, phrygian, harmonicMinor)
  // regardless of where plain positivity/negativity landed
  if (tenseNorm > 0.5 && idx > 2) idx = Math.max(1, idx - 3);

  idx = Math.max(0, Math.min(MODE_ORDER.length - 1, idx));
  return MODE_ORDER[idx];
}

// Root candidates — full chromatic spread across a comfortable low-mid register,
// so different texts land in noticeably different pitch areas, not just 5 options
function noteFreq(semisFromA2) { return 110.00 * Math.pow(2, semisFromA2 / 12); }
const ROOT_CANDIDATES = Array.from({ length: 12 }, (_, i) => noteFreq(i)); // A2 through G#3, all 12 semitones

let currentScale = buildScale(110.00, 'minor'); // [root, 2nd, 3rd, 4th, 5th, 6th, 7th]
let currentMood = 'minor';

function deriveTextHarmony(text) {
  const mood = detectMood(text);
  const h = hashText(text);
  const root = ROOT_CANDIDATES[h % ROOT_CANDIDATES.length];
  currentMood = mood;
  currentScale = buildScale(root, mood);
  return { mood, root, scale: currentScale };
}

// chord built from scale degrees 1-3-5 (and optionally 7) of the current scale — always in-key
function chordFromScale(scale, degreeRoot) {
  // degreeRoot: 0=i, 2=iii, 4=v, 6=vii (0-indexed into the 7-note scale array)
  const len = scale.length;
  const root = scale[degreeRoot % len] * (degreeRoot >= len ? 2 : 1);
  const third = scale[(degreeRoot + 2) % len] * ((degreeRoot + 2) >= len ? 2 : 1);
  const fifth = scale[(degreeRoot + 4) % len] * ((degreeRoot + 4) >= len ? 2 : 1);
  const seventh = scale[(degreeRoot + 6) % len] * ((degreeRoot + 6) >= len ? 2 : 1);
  return [root, third, fifth, seventh];
}

// ── Aphex Twin #3 (SAW 85-92) inspired ambient ───────────────
// Everything here shares ONE clock (a slow quarter-note pulse) so the
// pad, the sub pulse, and the motif lock together rhythmically. Harmony
// is drawn from currentScale, which is derived per-text from its mood.
function clearAmb() {
  ambTimers.forEach(id => clearTimeout(id));
  ambTimers = [];
  clockRunning = false;
}

let ambientDensity = 1; // 0.55 = sparse/start, 1 = normal/middle, 1.35 = dense/end
let clockRunning = false;

const BEAT_SEC = 1.15; // shared tempo — slow, ~52 BPM quarter notes
const BAR_BEATS = 4;

// scale degree roots to drift between for the pad chords — i, iii, v, vii
// (kept generic; actual frequencies come from currentScale at play time)
const CHORD_DEGREES = [0, 2, 4, 6];
// motif notes now pulled live from currentScale (octave-shifted), not a fixed list

function startAmbient(dests) {
  const c = ac();
  clockRunning = true;
  let beat = 0;       // global beat counter
  let lastDegree = null;

  // ---- warm pad: holds the current chord, crossfades into the next ----
  function playChord(freqs, dur) {
    const detunes = [-7, 7, 0, 4];
    freqs.forEach((f, idx) => {
      const type = idx === 0 ? 'sine' : (idx % 2 === 0 ? 'sine' : 'sawtooth');
      const osc = c.createOscillator(), g = c.createGain();
      const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1200; lp.Q.value = 0.4;
      osc.type = type; osc.frequency.value = f; osc.detune.value = detunes[idx % detunes.length];
      const peak = (idx === 0 ? 0.085 : 0.05) * ambientDensity;
      const attack = dur * 0.35;
      const release = dur * 0.5;
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(peak, c.currentTime + attack);
      g.gain.setValueAtTime(peak, c.currentTime + dur - release);
      g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
      osc.connect(lp); lp.connect(g);
      g.connect(reverbNode); dests.forEach(d => g.connect(d));
      osc.start(); osc.stop(c.currentTime + dur + 0.1);
    });
  }

  // ---- soft sub pulse on beat 1 and 3 of each bar — the heartbeat ----
  function playPulse() {
    const osc = c.createOscillator(), g = c.createGain();
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 180;
    osc.type = 'sine'; osc.frequency.value = 55;
    const dur = BEAT_SEC * 0.8;
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(0.09 * ambientDensity, c.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    osc.connect(lp); lp.connect(g);
    dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + dur + 0.05);
  }

  // ---- sparse motif note, quantized to the beat grid, drawn from current chord's scale ----
  function playMotifNote() {
    const f = pick(currentScale) * 2; // octave up from the pad register, into a singing range
    const osc = c.createOscillator(), g = c.createGain();
    const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2000;
    osc.type = 'sine'; osc.frequency.value = f;
    const dur = BEAT_SEC * rnd(1.4, 2.2);
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(rnd(0.03, 0.055) * ambientDensity, c.currentTime + 0.12);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    osc.connect(lp); lp.connect(g);
    g.connect(reverbNode); dests.forEach(d => g.connect(d));
    osc.start(); osc.stop(c.currentTime + dur + 0.1);
  }

  // ---- gentle tape warmth bed, slow and continuous, tied to bar length ----
  function playTapeWarmth(dur) {
    const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = (_rand() * 2 - 1) * 0.4;
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3200; bp.Q.value = 0.5;
    const g = c.createGain();
    const attack = dur * 0.3, release = dur * 0.3;
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(0.015 * ambientDensity, c.currentTime + attack);
    g.gain.setValueAtTime(0.015 * ambientDensity, c.currentTime + dur - release);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    src.connect(bp); bp.connect(g);
    dests.forEach(dd => g.connect(dd));
    src.start();
  }

  // ---- the shared clock: one bar = 4 beats, chord changes every bar ----
  function tick() {
    if (stopping || !clockRunning) return;
    const beatInBar = beat % BAR_BEATS;
    const barDur = BEAT_SEC * BAR_BEATS;

    if (beatInBar === 0) {
      // new bar — drift to a new (different) scale degree within currentScale,
      // re-voice the pad with overlap so it crossfades into the previous chord
      let degree = pick(CHORD_DEGREES);
      if (degree === lastDegree) degree = pick(CHORD_DEGREES.filter(d => d !== lastDegree));
      lastDegree = degree;
      playChord(chordFromScale(currentScale, degree), barDur * 1.15); // slightly longer than the bar so it crossfades into the next
      playTapeWarmth(barDur * 1.1);
    }

    // pulse on beats 0 and 2 (the "1 and 3")
    if (beatInBar === 0 || beatInBar === 2) playPulse();

    // motif notes: sparse, mostly on off-beats, density-gated
    if (_rand() < 0.32 * ambientDensity && (beatInBar === 1 || beatInBar === 3)) {
      playMotifNote();
    }

    beat++;
    ambTimers.push(setTimeout(tick, BEAT_SEC * 1000));
  }

  tick();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function tokenize(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (ch === ' ' || ch === '\n') {
      tokens.push({ type: 'space', start: i, end: i + 1, text: ch });
      i++;
    } else if ('.!?,;:'.includes(ch)) {
      tokens.push({ type: 'punct', start: i, end: i + 1, text: ch });
      i++;
    } else {
      let j = i;
      while (j < text.length && text[j] !== ' ' && text[j] !== '\n' && !'.!?,;:'.includes(text[j])) j++;
      tokens.push({ type: 'word', start: i, end: j, text: text.slice(i, j) });
      i = j;
    }
  }

  // annotate words with sentence context — look ahead to find each
  // sentence's ending punctuation so words get tagged with THEIR sentence's type
  const totalWords = tokens.filter(t => t.type === 'word').length;
  let wordIdx = 0;

  for (let k = 0; k < tokens.length; k++) {
    const t = tokens[k];
    if (t.type === 'word') {
      // scan forward to the next sentence-ending punctuation
      let endType = 'statement';
      for (let m = k + 1; m < tokens.length; m++) {
        if (tokens[m].type === 'punct') {
          if (tokens[m].text === '?') { endType = 'question'; break; }
          if (tokens[m].text === '!') { endType = 'exclaim'; break; }
          if (tokens[m].text === '.') { endType = 'statement'; break; }
        }
      }
      t.sentenceType = endType;
      wordIdx++;
      t.paraPos = wordIdx < totalWords * 0.18 ? 'start' : (wordIdx > totalWords * 0.82 ? 'end' : 'middle');
    }
  }
  return tokens;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '\n');
}

function buildRender(text, a, b) {
  if (a >= b) return esc(text);
  return esc(text.slice(0, a))
    + `<span class="w-active">${esc(text.slice(a, b))}</span>`
    + esc(text.slice(b));
}

function animBars(vol) {
  bars.forEach(b => { b.style.height = Math.round(rnd(1.5, vol * 17)) + 'px'; });
  setTimeout(() => bars.forEach(b => b.style.height = '1.5px'), 120);
}

function status(s) { stEl.textContent = s; }

// Harmony is only (re)derived once per text session — the first time play is pressed
// after a clear. Every subsequent press of play (even after continuing to write more)
// reads the WHOLE text from the very beginning again, using that same locked key.
let harmonyLocked = false;

async function play() {
  const text = editor.value;
  if (!text.trim()) return;

  if (!harmonyLocked) {
    const harmony = deriveTextHarmony(text); // sets currentScale + currentMood, locked until cleared
    harmonyLocked = true;
    status('key: ' + harmony.mood);
  }

  // reset the seeded RNG from this exact text every time — guarantees the
  // entire melody, voice choices, timing, and ambient pattern are identical
  // on every replay of the same text
  seedRng(hashText(text));

  playing = true; stopping = false;
  reverbNode = null; reverbSend = null;
  ambientDensity = 1;
  bPlay.disabled = true; bStop.disabled = false; bSave.disabled = true;
  editor.style.display = 'none';
  render.style.display = 'block';
  render.innerHTML = esc(text);
  viz.classList.add('on');
  prog.classList.add('on');
  pf.style.width = '0%';
  chunks = []; audioBlob = null;

  const c = ac();
  await c.resume();
  const sd = c.createMediaStreamDestination();
  const dests = [c.destination, sd];
  ensureReverb(dests);

  rec = new MediaRecorder(sd.stream);
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    audioBlob = new Blob(chunks, { type: 'audio/webm' });
    bSave.disabled = false;
    status('done — press write to continue, or play again');
  };
  rec.start();
  startAmbient(dests);

  const tokens = tokenize(text); // tokenize the FULL text — always read from the very beginning
  const playable = tokens.filter(t => t.type === 'word' || t.type === 'punct');
  const totalWords = tokens.filter(t => t.type === 'word').length;

  // voice groups by sentence type — question/exclaim lean toward brighter/plucked/percussive
  // voices, statements lean toward warmer pads/sustained/breathy voices. Indices map to the
  // VOICES array: 0 pad, 1 pluck, 2 breath, 3 bell, 4 ghost-chord, 5 piano, 6 warm-pad,
  // 7 string, 8 marimba, 9 glass-bell, 10 vibraphone, 11 music-box, 12 choir, 13 organ,
  // 14 sub-thump, 15 reed, 16 cello, 17 kalimba, 18 brass-swell, 19 celeste, 20 granular, 21 gong
  const VOICE_GROUPS = {
    statement: [0, 2, 5, 6, 10, 12, 13, 15, 16, 20, 21],
    question:  [1, 4, 7, 9, 11, 17, 19, 20],
    exclaim:   [1, 3, 5, 8, 9, 11, 14, 17, 18],
  };

  let voiceIdx = pick(VOICE_GROUPS.statement);
  let wordsSeen = 0;

  for (let i = 0; i < playable.length; i++) {
    if (stopping) break;
    const tok = playable[i];

    render.innerHTML = buildRender(text, tok.start, tok.end);

    if (tok.type === 'punct') {
      const intensity = 0.7 + ambientDensity * 0.3;
      playPunctuation(tok.text, dests, intensity);
      animBars(0.2 * intensity);
      const pause = tok.text === '.' ? 420 : tok.text === '?' ? 380 : tok.text === '!' ? 340 : tok.text === ',' ? 200 : 150;
      await sleep(pause);
      continue;
    }

    // word token
    wordsSeen++;
    const wlen = tok.text.replace(/\W/g, '').length || 1;
    const group = VOICE_GROUPS[tok.sentenceType] || VOICE_GROUPS.statement;

    // update ambient density by paragraph position: sparser at start, denser toward end
    ambientDensity = tok.paraPos === 'start' ? 0.55 : tok.paraPos === 'end' ? 1.35 : 1;

    const freq = pick(wordNoteScale());
    const vol  = rnd(0.18, 0.52);
    const dur  = rnd(0.22, 0.45);

    // shift voice within the sentence's appropriate group for variety
    if (_rand() < 0.4) voiceIdx = pick(group);
    VOICES[voiceIdx](freq, vol, dur, dests);
    animBars(vol);

    // reading pace: longer words get more time
    const base = 300 + wlen * 28;
    const spd  = Math.min(600, base) + rnd(-30, 50);
    pf.style.width = Math.round((wordsSeen / totalWords) * 100) + '%';
    status(Math.round((wordsSeen / totalWords) * 100) + '%');
    await sleep(spd);
  }

  stopping = true;
  clearAmb();
  pf.style.width = '100%';
  if (rec.state !== 'inactive') rec.stop();
  render.innerHTML = esc(text);
  viz.classList.remove('on');
  bars.forEach(b => b.style.height = '1.5px');
  playing = false;
  bPlay.disabled = false; bStop.disabled = true;
  setTimeout(() => prog.classList.remove('on'), 900);
  showContinuePrompt();
}

// After playback ends naturally, let the person resume writing — the
// textarea becomes editable again, pre-filled with what was just read,
// caret placed at the end so they can keep going.
function showContinuePrompt() {
  editor.style.display = '';
  render.style.display = 'none';
  editor.focus();
  editor.setSelectionRange(editor.value.length, editor.value.length);
  status('continue writing — same key carries on');
}

function stop() {
  stopping = true;
  clearAmb();
  if (rec && rec.state !== 'inactive') rec.stop();
  editor.style.display = '';
  render.style.display = 'none';
  viz.classList.remove('on');
  prog.classList.remove('on');
  bars.forEach(b => b.style.height = '1.5px');
  playing = false;
  bPlay.disabled = false; bStop.disabled = true;
  status('stopped');
}

bPlay.addEventListener('click', play);
bStop.addEventListener('click', stop);
bSave.addEventListener('click', () => {
  if (!audioBlob) return;
  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement('a');
  a.href = url; a.download = 'reading.webm'; a.click();
  URL.revokeObjectURL(url);
});
bClear.addEventListener('click', () => {
  if (playing) stop();
  editor.value = '';
  editor.style.display = '';
  render.style.display = 'none';
  ph.style.display = 'block';
  bPlay.disabled = true; bSave.disabled = true;
  audioBlob = null; chunks = [];
  wcEl.textContent = '0 words';
  pf.style.width = '0%';
  prog.classList.remove('on');
  harmonyLocked = false; // clearing the text means the NEXT play should derive a fresh scale
  status('ready');
});

editor.addEventListener('input', () => {
  const v = editor.value;
  ph.style.display = v ? 'none' : 'block';
  bPlay.disabled = !v.trim();
  const w = v.trim().split(/\s+/).filter(Boolean).length;
  wcEl.textContent = w + (w === 1 ? ' word' : ' words');
});

function flashBar() {
  const bar = document.getElementById('bar');
  bar.classList.add('show');
  clearTimeout(flashBar._t);
  flashBar._t = setTimeout(() => bar.classList.remove('show'), 1600);
}

document.addEventListener('keydown', (e) => {
  const meta = e.metaKey || e.ctrlKey;

  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    flashBar();
    if (!playing && !bPlay.disabled) play();
    return;
  }
  if (e.key === 'Escape') {
    if (playing) { e.preventDefault(); flashBar(); stop(); }
    return;
  }
  if (meta && (e.key === 's' || e.key === 'S')) {
    e.preventDefault();
    flashBar();
    if (!bSave.disabled) bSave.click();
    return;
  }
});
</script>
</body>
</html>
